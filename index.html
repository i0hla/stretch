<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTIMATE BRAINROT STRETCHER 🧠☢️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@900&family=Rubik+Mono+One&display=swap');
        
        body {
            background-color: #050505;
            color: white;
            font-family: 'Cairo', sans-serif;
            overflow-x: hidden;
        }

        .neon-text {
            color: #fff;
            text-shadow: 0 0 7px #fff, 0 0 21px #f0f, 0 0 42px #0fa;
            animation: pulsate 1.5s infinite alternate;
        }

        @keyframes pulsate {
            100% { text-shadow: 0 0 4px #fff, 0 0 11px #fff, 0 0 40px #0fa, 0 0 100px #0fa; }
            0% { text-shadow: 0 0 2px #fff, 0 0 4px #fff, 0 0 10px #f0f, 0 0 45px #f0f; }
        }

        .canvas-container {
            position: relative;
            max-width: 100%;
            border-radius: 24px;
            box-shadow: 0 0 20px rgba(0, 255, 170, 0.2);
            background: repeating-conic-gradient(#111 0% 25%, #000 0% 50%) 50% / 20px 20px;
            border: 2px solid #0fa;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas {
            display: block;
            max-width: 100%;
            height: auto;
            image-rendering: pixelated;
        }

        .btn-neon {
            background: transparent;
            color: #0fa;
            border: 1px solid #0fa;
            transition: all 0.2s ease;
            text-transform: uppercase;
            font-size: 0.75rem;
            font-weight: 900;
        }

        .btn-neon:hover {
            background: #0fa;
            color: #000;
            box-shadow: 0 0 15px #0fa;
            transform: scale(1.02);
        }

        .active-filter {
            background: #0fa !important;
            color: #000 !important;
            box-shadow: 0 0 30px #0fa !important;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #0fa; border-radius: 10px; }

        .grid-bg {
            background-image: 
                linear-gradient(rgba(0, 255, 170, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 170, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .control-group {
            background: rgba(20, 20, 20, 0.8);
            border: 1px solid rgba(0, 255, 170, 0.2);
            padding: 1rem;
            border-radius: 1rem;
        }

        input[type=range] {
            accent-color: #0fa;
            width: 100%;
        }
    </style>
</head>
<body class="grid-bg min-h-screen p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="text-center mb-10">
            <h1 class="text-5xl md:text-7xl font-black mb-2 neon-text italic uppercase tracking-tighter">
                BRAINROT STRETCHER
            </h1>
            <p class="text-[#0fa] font-bold tracking-[0.2em] animate-pulse text-xs md:text-sm">
                SYSTEM STATUS: CRITICAL ERROR // SHITPOST LEVEL: MAXIMUM
            </p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- Workspace (Center) -->
            <div class="lg:col-span-8 order-1 lg:order-1 flex flex-col gap-4">
                <div id="drop-zone" class="canvas-container min-h-[500px] cursor-pointer border-dashed hover:bg-[#0fa]/5 transition-all group">
                    <div id="placeholder-text" class="text-center p-10">
                        <div class="text-8xl mb-6 opacity-50 group-hover:scale-125 transition-transform duration-500">💀</div>
                        <p class="text-[#0fa] text-xl font-black uppercase tracking-widest">اسحب الضحية إلى هنا أو اضغط للرفع</p>
                    </div>
                    <canvas id="main-canvas" class="hidden"></canvas>
                </div>

                <div class="flex gap-4">
                    <button id="download-btn" class="hidden flex-1 py-4 bg-[#0fa] text-black font-black text-xl rounded-xl hover:shadow-[0_0_40px_#0fa] transition-all uppercase italic">تحميل المسخ 💾</button>
                    <button id="reset-btn" class="hidden px-8 py-4 bg-white text-black font-black text-xl rounded-xl hover:bg-gray-200 transition-all uppercase italic text-sm">الأصل 🔄</button>
                </div>
            </div>

            <!-- Side Controls (Right) -->
            <div class="lg:col-span-4 order-2 lg:order-2 space-y-4 max-h-[85vh] overflow-y-auto pr-2 custom-scrollbar">
                
                <!-- Color & FX Section -->
                <div class="control-group">
                    <h2 class="text-[#0fa] font-black text-sm mb-4 border-b border-[#0fa]/30 pb-2">☢️ مختبر التدمير اللوني (FX)</h2>
                    <div class="grid grid-cols-2 gap-2 mb-4">
                        <button onclick="setEffect('deepfry')" class="btn-neon p-3 rounded-lg">DEEP FRY 🔥</button>
                        <button onclick="setEffect('nuked')" class="btn-neon p-3 rounded-lg">NUKED ☢️</button>
                        <button onclick="setEffect('cursed')" class="btn-neon p-3 rounded-lg">CURSED 👁️</button>
                        <button onclick="setEffect('moldy')" class="btn-neon p-3 rounded-lg">MOLDY 🍄</button>
                        <button onclick="setEffect('invert')" class="btn-neon p-3 rounded-lg">DEMONIC 👹</button>
                        <button onclick="setEffect('shitpost')" class="btn-neon p-3 rounded-lg">LO-FI 💩</button>
                    </div>
                    <div class="space-y-3">
                        <div>
                            <span class="text-[10px] text-[#0fa]/70 uppercase">تخريب الألوان (Saturate)</span>
                            <input type="range" id="satRange" min="0" max="1000" value="100" oninput="draw()">
                        </div>
                        <div>
                            <span class="text-[10px] text-[#0fa]/70 uppercase">درجة القلي (Contrast)</span>
                            <input type="range" id="conRange" min="0" max="1000" value="100" oninput="draw()">
                        </div>
                    </div>
                </div>

                <!-- Stretching Section -->
                <div class="control-group">
                    <h2 class="text-fuchsia-500 font-black text-sm mb-4 border-b border-fuchsia-500/30 pb-2">📏 تشويه الأبعاد (STRETCH)</h2>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="setStretch('wide')" class="btn-neon p-3 rounded-lg border-fuchsia-500 text-fuchsia-500 hover:bg-fuchsia-500">WIDE ↔️</button>
                        <button onclick="setStretch('tall')" class="btn-neon p-3 rounded-lg border-fuchsia-500 text-fuchsia-500 hover:bg-fuchsia-500">TALL ↕️</button>
                        <button onclick="setStretch('wave')" class="btn-neon p-3 rounded-lg border-fuchsia-500 text-fuchsia-500 hover:bg-fuchsia-500">WAVE 🌊</button>
                        <button onclick="setStretch('bulge')" class="btn-neon p-3 rounded-lg border-fuchsia-500 text-fuchsia-500 hover:bg-fuchsia-500">BULGE 🎈</button>
                        <button onclick="setStretch('melt')" class="btn-neon p-3 rounded-lg border-fuchsia-500 text-fuchsia-500 hover:bg-fuchsia-500">MELT 🫠</button>
                        <button onclick="setStretch('perspective')" class="btn-neon p-3 rounded-lg border-fuchsia-500 text-fuchsia-500 hover:bg-fuchsia-500">POINTY 📐</button>
                    </div>
                    <div class="mt-4">
                        <span class="text-[10px] text-fuchsia-500/70 uppercase">قوة التشويه</span>
                        <input type="range" id="stretchPower" min="0" max="200" value="50" oninput="draw()">
                    </div>
                </div>

                <!-- Danger Zone -->
                <div class="control-group border-red-500/50">
                    <button onclick="applyChaos()" class="w-full p-4 rounded-xl text-center font-black text-sm border-2 border-red-500 text-red-500 hover:bg-red-500 hover:text-black transition-all shadow-[0_0_15px_rgba(239,68,68,0.2)]">
                        تدمير عشوائي (TOTAL CHAOS) ☣️
                    </button>
                </div>

                <input type="file" id="file-input" class="hidden" accept="image/*">
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('main-canvas');
        const ctx = canvas.getContext('2d');
        const fileInput = document.getElementById('file-input');
        const dropZone = document.getElementById('drop-zone');
        const placeholder = document.getElementById('placeholder-text');
        const downloadBtn = document.getElementById('download-btn');
        const resetBtn = document.getElementById('reset-btn');
        
        // Controls
        const satRange = document.getElementById('satRange');
        const conRange = document.getElementById('conRange');
        const stretchPower = document.getElementById('stretchPower');

        let originalImage = null;
        let currentEffect = 'none';
        let currentStretch = 'none';

        // --- Core Logic ---
        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        function handleFile(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    originalImage = img;
                    canvas.classList.remove('hidden');
                    placeholder.classList.add('hidden');
                    downloadBtn.classList.remove('hidden');
                    resetBtn.classList.remove('hidden');
                    draw();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function setEffect(eff) {
            currentEffect = eff;
            if(eff === 'deepfry') { satRange.value = 500; conRange.value = 400; }
            if(eff === 'nuked') { satRange.value = 1000; conRange.value = 800; }
            draw();
        }

        function setStretch(str) {
            currentStretch = str;
            draw();
        }

        function resetAll() {
            currentEffect = 'none';
            currentStretch = 'none';
            satRange.value = 100;
            conRange.value = 100;
            stretchPower.value = 50;
            draw();
        }
        resetBtn.onclick = resetAll;

        function draw() {
            if (!originalImage) return;

            const power = parseInt(stretchPower.value);
            const w = originalImage.width;
            const h = originalImage.height;

            // Step 1: Handle Dimensions
            let finalW = w;
            let finalH = h;
            if (currentStretch === 'wide') finalW = w * (1 + power/100);
            if (currentStretch === 'tall') finalH = h * (1 + power/100);

            canvas.width = finalW;
            canvas.height = finalH;

            // Step 2: Apply Color Filters
            let filterStr = `saturate(${satRange.value}%) contrast(${conRange.value}%)`;
            if (currentEffect === 'cursed') filterStr += ' hue-rotate(90deg) invert(20%)';
            if (currentEffect === 'invert') filterStr += ' invert(100%) hue-rotate(180deg)';
            if (currentEffect === 'moldy') filterStr += ' sepia(0.8) hue-rotate(50deg) blur(1px)';
            if (currentEffect === 'nuked') filterStr += ' brightness(1.5) contrast(1000%)';
            ctx.filter = filterStr;

            // Step 3: Draw base or complex stretch
            if (['wave', 'melt', 'perspective', 'bulge', 'shitpost'].includes(currentStretch) || currentEffect === 'shitpost') {
                renderComplexEffects(originalImage, finalW, finalH, power);
            } else {
                ctx.drawImage(originalImage, 0, 0, finalW, finalH);
            }
        }

        function renderComplexEffects(img, w, h, power) {
            ctx.drawImage(img, 0, 0, w, h);
            const imgData = ctx.getImageData(0, 0, w, h);
            ctx.clearRect(0, 0, w, h);

            if (currentStretch === 'wave') {
                for (let y = 0; y < h; y++) {
                    const xOff = Math.sin(y / (20 - power/10)) * power;
                    ctx.drawImage(img, 0, y, img.width, 1, xOff, y, w, 1);
                }
            } 
            else if (currentStretch === 'melt') {
                ctx.drawImage(img, 0, 0, w, h);
                for (let x = 0; x < w; x++) {
                    const yOff = Math.random() * power;
                    ctx.drawImage(img, (x/w)*img.width, 0, 1, img.height, x, yOff, 1, h);
                }
            }
            else if (currentStretch === 'perspective') {
                for (let y = 0; y < h; y++) {
                    const rowW = w * ( (1 - power/200) + (y / h) * (power/100));
                    ctx.drawImage(img, 0, (y/h)*img.height, img.width, 1, (w - rowW)/2, y, rowW, 1);
                }
            }
            else if (currentStretch === 'bulge') {
                applyBulgeEffect(img, w, h, power);
            }
            
            if (currentEffect === 'shitpost') {
                addShitpostCompression(w, h);
            }
        }

        function applyBulgeEffect(img, w, h, power) {
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = w; tempCanvas.height = h;
            const tCtx = tempCanvas.getContext('2d');
            tCtx.drawImage(img, 0, 0, w, h);
            
            const strength = power / 100;
            const centerX = w / 2;
            const centerY = h / 2;
            const radius = Math.min(w, h) / 1.5;

            const sourceData = tCtx.getImageData(0, 0, w, h);
            const outData = ctx.createImageData(w, h);

            for (let y = 0; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    let dx = x - centerX; let dy = y - centerY;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < radius) {
                        let factor = Math.pow(Math.sin(Math.PI * dist / (2 * radius)), -strength);
                        let sx = centerX + dx * factor;
                        let sy = centerY + dy * factor;
                        if (sx >= 0 && sx < w && sy >= 0 && sy < h) {
                            let sIdx = (Math.floor(sy) * w + Math.floor(sx)) * 4;
                            let dIdx = (y * w + x) * 4;
                            for(let i=0; i<4; i++) outData.data[dIdx+i] = sourceData.data[sIdx+i];
                        }
                    } else {
                        let idx = (y * w + x) * 4;
                        for(let i=0; i<4; i++) outData.data[idx+i] = sourceData.data[idx+i];
                    }
                }
            }
            ctx.putImageData(outData, 0, 0);
        }

        function addShitpostCompression(w, h) {
            const small = document.createElement('canvas');
            small.width = w/8; small.height = h/8;
            const sCtx = small.getContext('2d');
            sCtx.drawImage(canvas, 0, 0, small.width, small.height);
            ctx.imageSmoothingEnabled = false;
            ctx.drawImage(small, 0, 0, w, h);
        }

        function applyChaos() {
            if(!originalImage) return;
            satRange.value = Math.random() * 1000;
            conRange.value = Math.random() * 1000;
            stretchPower.value = Math.random() * 200;
            const effects = ['deepfry', 'nuked', 'cursed', 'moldy', 'invert', 'shitpost'];
            const stretches = ['wide', 'tall', 'wave', 'bulge', 'melt', 'perspective'];
            currentEffect = effects[Math.floor(Math.random()*effects.length)];
            currentStretch = stretches[Math.floor(Math.random()*stretches.length)];
            draw();
        }

        downloadBtn.onclick = () => {
            const link = document.createElement('a');
            link.download = `BRAINROT_${Date.now()}.png`;
            link.href = canvas.toDataURL();
            link.click();
        };

        // Drag & Drop Support
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eName => {
            dropZone.addEventListener(eName, e => { e.preventDefault(); e.stopPropagation(); }, false);
        });
        dropZone.addEventListener('drop', (e) => handleFile(e.dataTransfer.files[0]));
    </script>
</body>
</html>
