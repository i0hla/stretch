<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>واتساب المباشر</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #000000;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* شريط اختيار الدولة */
        .segmented-control {
            display: flex;
            background-color: #111111;
            padding: 4px;
            border-radius: 14px;
            gap: 4px;
        }

        .segment {
            flex: 1;
            padding: 12px 8px;
            text-align: center;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            color: #777777;
            transition: all 0.2s ease;
        }

        .segment.active {
            background-color: #ffffff;
            color: #000000;
            font-weight: 700;
        }

        /* حقل الإدخال */
        .input-group {
            background-color: #000000;
            border: 1px solid #222222;
            border-radius: 14px;
            display: flex;
            align-items: center;
            padding: 4px;
        }

        .prefix-display {
            padding: 0 16px;
            color: #555555;
            font-family: monospace;
            font-size: 18px;
            border-left: 1px solid #222222;
        }

        .input-group input {
            flex: 1;
            padding: 16px;
            background: transparent;
            border: none;
            color: white;
            font-size: 18px;
            outline: none;
            font-family: monospace;
        }

        /* الزر الرمادي للتجهيز */
        .secondary-button {
            background-color: #111111;
            color: #eeeeee;
            padding: 16px;
            border-radius: 14px;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            border: 1px solid #222222;
            transition: all 0.2s;
        }

        /* الزر الأبيض للذهاب (يظهر لاحقاً) */
        .primary-button {
            background-color: #ffffff;
            color: #000000;
            padding: 20px;
            border-radius: 16px;
            font-weight: 800;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-decoration: none;
            transition: transform 0.2s;
        }

        .primary-button:active {
            transform: scale(0.96);
        }

        .hidden { display: none; }

        .fade-in {
            animation: fadeIn 0.4s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- الأيقونة -->
    <div class="text-center mb-2">
        <svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" style="margin: 0 auto;">
            <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
        </svg>
    </div>

    <!-- اختيار الدولة -->
    <div class="segmented-control">
        <div class="segment active" data-code="966">السعودية</div>
        <div class="segment" data-code="971">الإمارات</div>
        <div class="segment" data-code="965">الكويت</div>
        <div class="segment" data-code="20">مصر</div>
    </div>

    <!-- حقل الرقم مع إظهار الرمز -->
    <div class="input-group">
        <div id="prefixLabel" class="prefix-display">+966</div>
        <input type="tel" id="phoneNumber" placeholder="5xxxxxxxx" autocomplete="off">
    </div>

    <!-- زر التجهيز -->
    <button id="prepBtn" onclick="prepareLink()" class="secondary-button">
        تجهيز الرابط
    </button>

    <!-- الزر النهائي للذهاب (مخفي في البداية) -->
    <div id="resultBox" class="hidden fade-in">
        <a id="finalLink" href="#" target="_blank" class="primary-button">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.067 2.877 1.215 3.076.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
            انتقل إلى واتساب
        </a>
    </div>
</div>

<script>
    let selectedCode = "966";

    // تفعيل أزرار الدولة
    const segments = document.querySelectorAll('.segment');
    const prefixLabel = document.getElementById('prefixLabel');

    segments.forEach(seg => {
        seg.addEventListener('click', () => {
            segments.forEach(s => s.classList.remove('active'));
            seg.classList.add('active');
            selectedCode = seg.getAttribute('data-code');
            prefixLabel.innerText = "+" + selectedCode;
            
            // إخفاء زر النتيجة عند تغيير الدولة لإعادة التجهيز
            document.getElementById('resultBox').classList.add('hidden');
        });
    });

    function prepareLink() {
        let phone = document.getElementById('phoneNumber').value.trim();
        const resultBox = document.getElementById('resultBox');
        const finalLink = document.getElementById('finalLink');

        // تنظيف
        phone = phone.replace(/\D/g, '');
        if (phone.startsWith('0')) phone = phone.substring(1);

        if (phone.length < 5) {
            alert("يرجى إدخال رقم صحيح");
            return;
        }

        // إنشاء الرابط
        const url = `https://wa.me/${selectedCode}${phone}`;
        finalLink.href = url;

        // إظهار الزر
        resultBox.classList.remove('hidden');
    }

    // دعم Enter للتجهيز
    document.getElementById('phoneNumber').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') prepareLink();
    });
</script>

</body>
</html>
