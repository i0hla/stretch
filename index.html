<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON STRETCH MASTER 🧠</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@900&display=swap');
        
        body {
            background-color: #050505;
            color: white;
            font-family: 'Cairo', sans-serif;
            overflow-x: hidden;
        }

        .neon-text {
            color: #fff;
            text-shadow: 
                0 0 7px #fff,
                0 0 10px #fff,
                0 0 21px #fff,
                0 0 42px #0fa,
                0 0 82px #0fa,
                0 0 92px #0fa,
                0 0 102px #0fa,
                0 0 151px #0fa;
            animation: pulsate 1.5s infinite alternate;
        }

        @keyframes pulsate {
            100% {
                text-shadow: 
                0 0 4px #fff,
                0 0 11px #fff,
                0 0 19px #fff,
                0 0 40px #0fa,
                0 0 80px #0fa,
                0 0 90px #0fa,
                0 0 100px #0fa,
                0 0 150px #0fa;
            }
            0% {
                text-shadow: 
                0 0 2px #fff,
                0 0 4px #fff,
                0 0 6px #fff,
                0 0 10px #0fa,
                0 0 45px #0fa,
                0 0 55px #0fa,
                0 0 70px #0fa,
                0 0 80px #0fa;
            }
        }

        .canvas-container {
            position: relative;
            max-width: 100%;
            border-radius: 24px;
            box-shadow: 0 0 20px rgba(0, 255, 170, 0.2);
            background: #000;
            border: 2px solid #0fa;
        }

        canvas {
            display: block;
            max-width: 100%;
            height: auto;
            margin: 0 auto;
            image-rendering: pixelated;
        }

        .btn-neon {
            background: transparent;
            color: #0fa;
            border: 1px solid #0fa;
            transition: all 0.3s ease;
            box-shadow: inset 0 0 0 0 #0fa;
        }

        .btn-neon:hover {
            background: #0fa;
            color: #000;
            box-shadow: 0 0 20px #0fa;
            transform: translateY(-2px);
        }

        .active-filter {
            background: #0fa !important;
            color: #000 !important;
            box-shadow: 0 0 30px #0fa !important;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #0fa;
            border-radius: 10px;
        }

        .grid-bg {
            background-image: 
                linear-gradient(rgba(0, 255, 170, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 170, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
        }
    </style>
</head>
<body class="grid-bg min-h-screen p-4 md:p-10">

    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="text-center mb-16">
            <h1 class="text-6xl md:text-8xl font-black mb-4 neon-text italic uppercase tracking-tighter">
                STRETCH MASTER
            </h1>
            <p class="text-[#0fa] font-bold tracking-[0.3em] animate-pulse">SYSTEM ONLINE // BRAINROT ACTIVATED</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            
            <!-- Workspace -->
            <div class="lg:col-span-8 flex flex-col gap-6">
                <div id="drop-zone" class="canvas-container min-h-[550px] flex items-center justify-center cursor-pointer border-dashed hover:bg-[#0fa]/5 transition-all group">
                    <div id="placeholder-text" class="text-center">
                        <div class="text-7xl mb-6 opacity-50 group-hover:scale-110 transition-transform">👽</div>
                        <p class="text-[#0fa] text-xl font-black uppercase tracking-widest">ارفع الضحية هنا</p>
                    </div>
                    <canvas id="main-canvas" class="hidden"></canvas>
                </div>

                <div class="flex gap-4">
                    <button id="download-btn" class="hidden flex-1 py-5 bg-[#0fa] text-black font-black text-2xl rounded-xl hover:shadow-[0_0_40px_#0fa] transition-all uppercase italic">حفظ النتيجة 💾</button>
                    <button id="reset-btn" class="hidden px-10 py-5 bg-white text-black font-black text-2xl rounded-xl hover:bg-gray-200 transition-all uppercase italic">الأصل 🔄</button>
                </div>
            </div>

            <!-- Side Controls -->
            <div class="lg:col-span-4">
                <div class="bg-black/80 backdrop-blur-md p-6 rounded-[32px] border border-[#0fa]/30 sticky top-10 shadow-[0_0_50px_rgba(0,255,170,0.1)]">
                    <h2 class="text-xl font-black mb-8 text-[#0fa] flex items-center gap-3">
                        <span class="animate-ping w-2 h-2 bg-[#0fa] rounded-full"></span>
                        مختبر التشويه النووي
                    </h2>

                    <div class="space-y-6 max-h-[60vh] overflow-y-auto pr-2 custom-scrollbar">
                        
                        <section>
                            <label class="block text-[10px] font-black text-[#0fa]/50 mb-4 uppercase tracking-[0.2em]">Linear Distortion</label>
                            <div class="flex flex-col gap-2">
                                <button onclick="applyStretch('wide_1')" class="btn-neon p-4 rounded-xl text-right font-bold text-sm">عريض (WIDE)</button>
                                <button onclick="applyStretch('wide_2')" class="btn-neon p-4 rounded-xl text-right font-bold text-sm">عريض جداً (THICC)</button>
                                <button onclick="applyStretch('tall')" class="btn-neon p-4 rounded-xl text-right font-bold text-sm">طويل جداً (LONG)</button>
                                <button onclick="applyStretch('short')" class="btn-neon p-4 rounded-xl text-right font-bold text-sm">مضغوط (SQUASH)</button>
                            </div>
                        </section>

                        <section>
                            <label class="block text-[10px] font-black text-[#0fa]/50 mb-4 uppercase tracking-[0.2em]">Cursed FX</label>
                            <div class="flex flex-col gap-2">
                                <button onclick="applyStretch('wave')" class="btn-neon p-4 rounded-xl text-right font-bold text-sm">تموج (WAVE)</button>
                                <button onclick="applyStretch('melt')" class="btn-neon p-4 rounded-xl text-right font-bold text-sm">انصهار (MELT)</button>
                                <button onclick="applyStretch('zigzag')" class="btn-neon p-4 rounded-xl text-right font-bold text-sm">متعرج (ZIGZAG)</button>
                                <button onclick="applyStretch('perspective')" class="btn-neon p-4 rounded-xl text-right font-bold text-sm">منظور (POINTY)</button>
                            </div>
                        </section>

                        <section>
                            <label class="block text-[10px] font-black text-red-500 mb-4 uppercase tracking-[0.2em]">Danger Zone</label>
                            <button onclick="applyStretch('random')" class="w-full p-4 rounded-xl text-right font-bold text-sm border border-red-500 text-red-500 hover:bg-red-500 hover:text-black transition-all shadow-[0_0_15px_rgba(239,68,68,0.2)]">تمطيط عشوائي (CHAOS)</button>
                        </section>
                    </div>

                    <input type="file" id="file-input" class="hidden" accept="image/*">
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('main-canvas');
        const ctx = canvas.getContext('2d');
        const fileInput = document.getElementById('file-input');
        const dropZone = document.getElementById('drop-zone');
        const placeholder = document.getElementById('placeholder-text');
        const downloadBtn = document.getElementById('download-btn');
        const resetBtn = document.getElementById('reset-btn');

        let originalImage = null;

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        function handleFile(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    originalImage = img;
                    resetImage();
                    canvas.classList.remove('hidden');
                    placeholder.classList.add('hidden');
                    downloadBtn.classList.remove('hidden');
                    resetBtn.classList.remove('hidden');
                    dropZone.style.borderStyle = 'solid';
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        function resetImage() {
            if (!originalImage) return;
            canvas.width = originalImage.width;
            canvas.height = originalImage.height;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(originalImage, 0, 0);
            updateActiveBtn(null);
        }

        resetBtn.onclick = resetImage;

        function updateActiveBtn(type) {
            document.querySelectorAll('button').forEach(btn => {
                btn.classList.remove('active-filter');
                if(btn.getAttribute('onclick')?.includes(`'${type}'`)) {
                    btn.classList.add('active-filter');
                }
            });
        }

        function applyStretch(type) {
            if (!originalImage) return;
            updateActiveBtn(type);
            
            const w = originalImage.width;
            const h = originalImage.height;

            switch(type) {
                case 'wide_1':
                    canvas.width = w * 1.8;
                    canvas.height = h;
                    ctx.drawImage(originalImage, 0, 0, canvas.width, canvas.height);
                    break;
                case 'wide_2':
                    canvas.width = w * 3.5;
                    canvas.height = h * 0.7;
                    ctx.drawImage(originalImage, 0, 0, canvas.width, canvas.height);
                    break;
                case 'tall':
                    canvas.width = w;
                    canvas.height = h * 2.5;
                    ctx.drawImage(originalImage, 0, 0, canvas.width, canvas.height);
                    break;
                case 'short':
                    canvas.width = w;
                    canvas.height = h * 0.3;
                    ctx.drawImage(originalImage, 0, 0, canvas.width, canvas.height);
                    break;
                case 'wave':
                    canvas.width = w;
                    canvas.height = h;
                    ctx.clearRect(0, 0, w, h);
                    for (let y = 0; y < h; y++) {
                        const xOffset = Math.sin(y / 15) * 60;
                        ctx.drawImage(originalImage, 0, y, w, 1, xOffset, y, w, 1);
                    }
                    break;
                case 'melt':
                    canvas.width = w;
                    canvas.height = h;
                    ctx.drawImage(originalImage, 0, 0);
                    for (let x = 0; x < w; x++) {
                        const stretchAmt = Math.random() * 150;
                        ctx.drawImage(originalImage, x, 0, 1, h, x, stretchAmt, 1, h);
                    }
                    break;
                case 'zigzag':
                    canvas.width = w;
                    canvas.height = h;
                    ctx.clearRect(0,0,w,h);
                    for (let y = 0; y < h; y++) {
                        const xOffset = (y % 50 < 25) ? 50 : -50;
                        ctx.drawImage(originalImage, 0, y, w, 1, xOffset, y, w, 1);
                    }
                    break;
                case 'perspective':
                    canvas.width = w;
                    canvas.height = h;
                    ctx.clearRect(0,0,w,h);
                    for (let y = 0; y < h; y++) {
                        const rowWidth = w * (0.2 + (y / h) * 0.8);
                        ctx.drawImage(originalImage, 0, y, w, 1, (w - rowWidth)/2, y, rowWidth, 1);
                    }
                    break;
                case 'random':
                    canvas.width = w * (0.3 + Math.random() * 3);
                    canvas.height = h * (0.3 + Math.random() * 3);
                    ctx.drawImage(originalImage, 0, 0, canvas.width, canvas.height);
                    break;
            }
        }

        downloadBtn.onclick = () => {
            const link = document.createElement('a');
            link.download = `cursed_neon_${Date.now()}.png`;
            link.href = canvas.toDataURL();
            link.click();
        };

        // Drag & Drop
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, e => {
                e.preventDefault();
                e.stopPropagation();
            }, false);
        });

        dropZone.addEventListener('drop', (e) => {
            handleFile(e.dataTransfer.files[0]);
        });
    </script>
</body>
</html>
